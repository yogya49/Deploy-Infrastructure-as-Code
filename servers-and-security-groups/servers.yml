AWSTemplateFormatVersion: 2010-09-09

Description:
  Udagram Servers Stack

Parameters:

  EnvironmentName:
    Description: An environment name that will be prefixed to resource names
    Type: String

Resources:

  # LOAD BALANCER SECURITY GROUP
  LBSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow http access to our load balancer

      VpcId:
        Fn::ImportValue:
          !Sub "${EnvironmentName}-VPCID"

      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0


  # WEB SERVER SECURITY GROUP
  WebServerSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow http access to our hosts from the LB Security Group

      VpcId:
        Fn::ImportValue:
          !Sub "${EnvironmentName}-VPCID"

      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref LBSecGroup

      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 65535
          CidrIp: 0.0.0.0/0


  # IAM ROLE
  WebAppInstanceRole:
    Type: AWS::IAM::Role
    Properties:

      RoleName: !Sub "${EnvironmentName}-web-servers"

      AssumeRolePolicyDocument:
        Version: '2012-10-17'

        Statement:
          - Effect: Allow

            Principal:
              Service:
                - ec2.amazonaws.com

            Action:
              - sts:AssumeRole

      Policies:
        - PolicyName: s3

          PolicyDocument:
            Version: '2012-10-17'

            Statement:
              - Effect: Allow

                Action:
                  - s3:GetObject

                Resource:
                  - !Sub "arn:aws:s3:::any-bucket-name/*"


  # INSTANCE PROFILE
  WebAppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:

      Path: "/"

      Roles:
        - !Ref WebAppInstanceRole


  # LAUNCH TEMPLATE
  WebAppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:

      LaunchTemplateName: !Sub "${EnvironmentName}-web-servers"

      LaunchTemplateData:

        ImageId: ami-0557a15b87f6559cf

        InstanceType: t2.micro

        SecurityGroupIds:
          - !Ref WebServerSecGroup

        IamInstanceProfile:
          Name: !Ref WebAppInstanceProfile

        BlockDeviceMappings:
          - DeviceName: "/dev/xvda"
            Ebs:
              VolumeSize: 10

        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            apt-get update -y
            apt-get install nginx -y
            systemctl start nginx
            systemctl enable nginx

            echo "Udagram App Running" > /var/www/html/index.nginx-debian.html


  # TARGET GROUP
  WebAppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:

      Port: 80
      Protocol: HTTP

      VpcId:
        Fn::ImportValue:
          Fn::Sub: "${EnvironmentName}-VPCID"

      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 10
      HealthCheckTimeoutSeconds: 8
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5

      TargetType: instance


  # LOAD BALANCER
  WebAppLB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:

      Scheme: internet-facing

      Type: application

      Subnets:
        - Fn::ImportValue: !Sub "${EnvironmentName}-PUB1-SN"
        - Fn::ImportValue: !Sub "${EnvironmentName}-PUB2-SN"

      SecurityGroups:
        - !Ref LBSecGroup


  # LISTENER
  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:

      LoadBalancerArn: !Ref WebAppLB

      Port: 80

      Protocol: HTTP

      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebAppTargetGroup


  # LISTENER RULE
  ALBListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:

      ListenerArn: !Ref Listener

      Priority: 1

      Conditions:
        - Field: path-pattern
          Values:
            - /

      Actions:
        - Type: forward
          TargetGroupArn: !Ref WebAppTargetGroup


  # AUTO SCALING GROUP
  WebAppGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:

      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub "${EnvironmentName}-PRIV1-SN"
        - Fn::ImportValue: !Sub "${EnvironmentName}-PRIV2-SN"

      LaunchTemplate:
        LaunchTemplateId: !Ref WebAppLaunchTemplate
        Version: !GetAtt WebAppLaunchTemplate.LatestVersionNumber

      MinSize: '1'
      MaxSize: '3'
      DesiredCapacity: '1'

      TargetGroupARNs:
        - !Ref WebAppTargetGroup


Outputs:

  LoadBalancerDNS:
    Description: Load Balancer DNS Name

    Value: !GetAtt WebAppLB.DNSName
